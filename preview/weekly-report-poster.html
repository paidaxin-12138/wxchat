<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>摸鱼周报海报 - 布局预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", -apple-system, sans-serif;
      background: #2c3e2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      color: #E8F5E9;
      font-size: 16px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .poster {
      width: 100%;
      max-width: 750px;
      min-height: 1200px;
      background: linear-gradient(180deg, #E8F5E9 0%, #66BB6A 100%);
      border-radius: 16px;
      overflow: hidden;
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      grid-template-areas:
        "header  header"
        "money   rank"
        "metrics side"
        "footer  footer";
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(46, 125, 50, 0.1);
      overflow: hidden;
    }

    .header {
      grid-area: header;
      background: transparent;
      box-shadow: none;
      text-align: center;
      padding: 0 0 8px;
    }

    .header h2 { font-size: 42px; color: #2D2F36; font-weight: 700; }
    .header p { margin-top: 12px; font-size: 24px; color: #4A4E5C; }

    .money {
      grid-area: money;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 230px;
      gap: 16px;
    }

    .money .amount { font-size: 52px; font-weight: 700; color: #2E7D32; }
    .money .equiv { font-size: 22px; color: #7F8C8D; }

    .rank {
      grid-area: rank;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      min-height: 230px;
    }

    .rank-title { font-size: 28px; font-weight: 700; color: #2C3E50; }

    .progress-track {
      width: 100%;
      height: 14px;
      background: #ECF0F1;
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-fill { height: 100%; width: 42%; background: #66BB6A; border-radius: 8px; }
    .rank-hint { font-size: 20px; color: #7F8C8D; }

    .metrics {
      grid-area: metrics;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      background: transparent;
      box-shadow: none;
      padding: 0;
      min-height: 400px;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      min-height: 160px;
      text-align: center;
      gap: 8px;
    }

    .metric-card .emoji { font-size: 32px; }
    .metric-card .label { font-size: 22px; color: #7F8C8D; }
    .metric-card .val { font-size: 24px; font-weight: 700; color: #2E7D32; word-break: keep-all; }

    .side {
      grid-area: side;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      min-height: 400px;
      text-align: center;
    }

    .achievement { font-size: 26px; color: #2C3E50; line-height: 1.5; }
    .beat { font-size: 28px; color: #2C3E50; }

    .footer {
      grid-area: footer;
      min-height: 220px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 28px;
      gap: 12px;
    }

    .footer .slogan {
      font-size: 32px;
      font-weight: 700;
      color: #C62828;
    }

    .footer .sub {
      font-size: 20px;
      color: #7F8C8D;
    }

    .qrcode {
      position: absolute;
      left: 24px;
      bottom: 20px;
      width: 100px;
      height: 100px;
      background: #BDC3C7;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
    }

    .stamp {
      position: absolute;
      right: 24px;
      bottom: 32px;
      width: 108px;
      height: 108px;
      border: 4px solid #C62828;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #C62828;
      font-weight: 700;
      font-size: 22px;
      transform: rotate(-12deg);
      background: rgba(198, 40, 40, 0.06);
      box-shadow: inset 0 0 0 6px rgba(198, 40, 40, 0.15);
    }

    @media (max-width: 600px) {
      .poster {
        padding: 24px 16px;
        gap: 16px;
        grid-template-areas:
          "header  header"
          "money   money"
          "rank    rank"
          "metrics metrics"
          "side    side"
          "footer  footer";
      }
      .header h2 { font-size: 32px; }
      .money .amount { font-size: 42px; }
      .metrics, .side { min-height: auto; }
    }
  </style>
</head>
<body>
  <h1>摸鱼周报海报 · 布局预览</h1>

  <div class="poster">
    <header class="header">
      <h2>📊 摸鱼周报</h2>
      <p>2026.05.25 - 2026.05.31</p>
    </header>

    <section class="card money">
      <div class="amount">¥52.28</div>
      <div class="equiv">相当于 1 杯星巴克</div>
    </section>

    <section class="card rank">
      <div class="rank-title">🏆 带薪达人</div>
      <div class="progress-track"><div class="progress-fill"></div></div>
      <div class="rank-hint">距下一段位还需 ¥147.7</div>
    </section>

    <section class="metrics">
      <div class="card metric-card">
        <span class="emoji">🚽</span>
        <span class="label">上厕所</span>
        <span class="val">3 次</span>
      </div>
      <div class="card metric-card">
        <span class="emoji">💧</span>
        <span class="label">喝水</span>
        <span class="val">1.5 升</span>
      </div>
      <div class="card metric-card">
        <span class="emoji">⚡</span>
        <span class="label">充电</span>
        <span class="val">0.3 小时</span>
      </div>
      <div class="card metric-card">
        <span class="emoji">💬</span>
        <span class="label">聊天</span>
        <span class="val">1 次</span>
      </div>
    </section>

    <section class="card side">
      <div class="achievement">🏅 本周新成就：第一桶金</div>
      <div class="beat">🔥 超过 44% 的摸鱼人</div>
    </section>

    <footer class="card footer">
      <div class="slogan">摸鱼经济学，带薪就是赚！</div>
      <div class="sub">—— 官方摸鱼周报 ——</div>
      <div class="qrcode">码</div>
      <div class="stamp"><span>摸鱼</span><span>认证</span></div>
    </footer>
  </div>
</body>
</html>
